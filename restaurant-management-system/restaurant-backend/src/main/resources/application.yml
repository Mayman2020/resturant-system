spring:
  datasource:
    url: ${DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=restaurant_mgmt}}
    username: ${DB_USER:${SPRING_DATASOURCE_USERNAME:postgres}}
    password: ${DB_PASS:${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:admin}}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  flyway:
    enabled: true
    locations: classpath:db/migration
    create-schemas: true
    default-schema: restaurant_mgmt
    schemas: restaurant_mgmt,public
    baseline-on-migrate: true
    validate-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: restaurant_mgmt

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  web:
    locale: en
    locale-resolver: accept-header

jwt:
  secret: ${JWT_SECRET:RestaurantManagementSecretKey2024VeryLongAndSecureKeyForJWT}
  expiration: 86400000
  refresh-expiration: 604800000

user:
  default:
    password: ${USER_DEFAULT_PASSWORD:Dev@Local2026!}

server:
  port: 8083
  servlet:
    context-path: /api/v1

logging:
  level:
    com.restaurantmanagement: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
    org.hibernate.SQL: WARN
