<div class="page-shell">
  <app-page-header [title]="'USERS.TITLE' | translate">
    <div class="page-actions">
      <rms-icon-btn icon="add" tooltipKey="USERS.NEW" variant="primary" *appCan="'users'; appCanAction: 'create'" (clicked)="onCreate()"></rms-icon-btn>
      <rms-icon-btn icon="refresh" tooltipKey="COMMON.REFRESH" (clicked)="load()"></rms-icon-btn>
    </div>
  </app-page-header>

  <div class="loading-wrap" *ngIf="loading"><mat-spinner diameter="40"></mat-spinner></div>

  <div class="app-list-surface" *ngIf="!loading">
    <section class="list-stats">
      <article class="stat-pill stat-pill--indigo"><span class="stat-label">{{ 'COMMON.TOTAL' | translate }}</span><strong>{{ total }}</strong></article>
      <article class="stat-pill stat-pill--cyan"><span class="stat-label">{{ 'COMMON.ON_PAGE' | translate }}</span><strong>{{ rows.length }}</strong></article>
    </section>
    <section class="estate-card directory-table-card">
      <div class="estate-table-toolbar directory-toolbar">
        <div class="directory-toolbar-top table-list-toolbar">
          <div class="directory-search">
            <span class="material-icons">search</span>
            <input [(ngModel)]="search" (keyup.enter)="page=0; load()" [placeholder]="'COMMON.SEARCH' | translate">
          </div>
          <rms-icon-btn icon="search" tooltipKey="COMMON.SEARCH" variant="primary" (clicked)="page=0; load()"></rms-icon-btn>
        </div>
      </div>
      <div class="app-table-wrap">
        <table mat-table [dataSource]="rows" class="app-data-table">
          <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
            <th mat-header-cell *matHeaderCellDef>{{ col.labelKey | translate }}</th>
            <td mat-cell *matCellDef="let row">
              <span *ngIf="col.key === 'role'">{{ row.role | enumTranslate:'ROLE' }}</span>
              <span *ngIf="col.key !== 'role'">{{ row[col.key] }}</span>
            </td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>{{ 'COMMON.ACTIONS' | translate }}</th>
            <td mat-cell *matCellDef="let row">
              <button *appCan="'users'; appCanAction: 'edit'" mat-icon-button type="button" (click)="onEdit(row)"><span class="material-icons">edit</span></button>
              <button *appCan="'users'; appCanAction: 'edit'" mat-icon-button type="button" (click)="onToggle(row)"><span class="material-icons">{{ row.active ? 'person_off' : 'person' }}</span></button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
      <p *ngIf="!rows.length" class="empty-state">{{ 'COMMON.NO_DATA' | translate }}</p>
      <app-table-pager [length]="total" [pageSize]="size" [pageIndex]="page" (pageIndexChange)="onPageIndexChange($event)"></app-table-pager>
    </section>
  </div>
</div>
