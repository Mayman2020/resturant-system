<div class="login-page"><form class="login-card card" [formGroup]="form" (ngSubmit)="submit()"><h1>{{ 'AUTH.LOGIN' | translate }}</h1><p>{{ 'AUTH.WELCOME' | translate }}</p><mat-form-field appearance="outline" class="full"><mat-label>{{ 'AUTH.USERNAME' | translate }}</mat-label><input matInput formControlName="username"></mat-form-field><mat-form-field appearance="outline" class="full"><mat-label>{{ 'AUTH.PASSWORD' | translate }}</mat-label><input matInput [type]="showPassword ? 'text' : 'password'" formControlName="password"><button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword"><mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon></button></mat-form-field><button mat-flat-button color="primary" class="full" [disabled]="loading">{{ 'AUTH.SIGN_IN' | translate }}</button></form></div>
