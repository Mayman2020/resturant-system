<header class="topbar card">
  <button mat-icon-button type="button" (click)="toggleSidebar.emit()" [attr.aria-label]="'TOPBAR.TOGGLE_SIDEBAR' | translate">
    <mat-icon>menu</mat-icon>
  </button>

  <mat-form-field class="branch-select" appearance="outline" subscriptSizing="dynamic">
    <mat-label>{{ 'COMMON.BRANCH' | translate }}</mat-label>
    <mat-select [(value)]="selectedBranchId" (selectionChange)="onBranchChange($event.value)">
      <mat-option *ngFor="let b of branches" [value]="b.id">{{ b.name }}</mat-option>
    </mat-select>
  </mat-form-field>

  <div class="spacer"></div>

  <button mat-icon-button type="button" [matMenuTriggerFor]="langMenu" [attr.aria-label]="'TOPBAR.LANGUAGE' | translate">
    <mat-icon>language</mat-icon>
  </button>
  <mat-menu #langMenu="matMenu">
    <button mat-menu-item *ngFor="let l of i18n.languages" (click)="setLang(l.code)">{{ l.nativeLabel }}</button>
  </mat-menu>

  <button mat-icon-button type="button" (click)="theme.toggle()" [attr.aria-label]="themeTooltipKey | translate">
    <mat-icon>{{ theme.isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>

  <span class="user">{{ auth.getCurrentUser()?.fullName || auth.getCurrentUser()?.username }}</span>
</header>
