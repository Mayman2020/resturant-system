<header class="topbar">
  <button mat-icon-button type="button" class="mobile-menu" (click)="toggleSidebar.emit()">
    <mat-icon>menu</mat-icon>
  </button>

  <div class="topbar-search">
    <span class="material-icons">search</span>
    <input type="search" [(ngModel)]="searchQuery" [placeholder]="'TOPBAR.SEARCH_PLACEHOLDER' | translate" (keyup.enter)="onSearch()">
  </div>

  <div class="topbar-actions">
    <button type="button" class="tb-lang-btn" [matMenuTriggerFor]="langMenu" [matTooltip]="'TOPBAR.LANGUAGE' | translate">
      <img class="flag" [src]="activeLanguage.flagUrl" [attr.alt]="activeLanguage.nativeLabel">
      <span>{{ activeLanguage.nativeLabel }}</span>
    </button>
    <mat-menu #langMenu="matMenu">
      <button mat-menu-item *ngFor="let lang of languages" (click)="setLang(lang.code)">
        <img class="flag" [src]="lang.flagUrl" width="22" height="16" [attr.alt]="lang.nativeLabel">
        <span>{{ lang.nativeLabel }}</span>
      </button>
    </mat-menu>

    <button type="button" class="tb-theme-btn" (click)="theme.toggle()" [matTooltip]="themeTooltipKey | translate">
      <span class="material-icons">{{ theme.isDark ? 'light_mode' : 'dark_mode' }}</span>
    </button>

    <a class="tb-action-btn" routerLink="/admin/notifications"
       [matBadge]="unreadCount > 0 ? unreadCount : null" matBadgeColor="accent" matBadgeSize="small">
      <span class="material-icons">notifications</span>
    </a>

    <button type="button" class="user-btn" [matMenuTriggerFor]="profileMenu">
      <span class="user-avatar">{{ initials }}</span>
      <span>{{ auth.getCurrentUser()?.fullName || auth.getCurrentUser()?.username }}</span>
      <span class="material-icons" style="font-size:18px;color:var(--ink-400)">expand_more</span>
    </button>
    <mat-menu #profileMenu="matMenu">
      <button mat-menu-item routerLink="/admin/profile"><mat-icon>person</mat-icon>{{ 'NAV.PROFILE' | translate }}</button>
      <button mat-menu-item routerLink="/admin/settings"><mat-icon>settings</mat-icon>{{ 'NAV.SETTINGS' | translate }}</button>
      <button mat-menu-item (click)="auth.logout()"><mat-icon>logout</mat-icon>{{ 'AUTH.LOGOUT' | translate }}</button>
    </mat-menu>
  </div>
</header>
